# fly.toml app configuration file generated for blocks-finance on 2026-02-10T17:48:52-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blocks-finance'
primary_region = 'sjc'

[http_service]
  internal_port = 8080
  force_https = true
  # auto_start: machine wakes on any HTTP request (e.g. from GitHub Actions daily cron)
  auto_start_machines = true
  # auto_stop: 'stop' saves cost; machine restarts on next request within ~2s.
  # Change to 'suspend' (preserves memory) if you need the APScheduler to survive idle periods,
  # but the GitHub Actions workflow is the recommended scheduling mechanism.
  auto_stop_machines = 'stop'
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
