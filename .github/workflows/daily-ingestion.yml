name: Daily Data Ingestion

# Runs Mon–Fri at 06:30 UTC (before US market open).
# The Render free-tier service spins down after 15 min idle and takes ~50s to
# cold-start. The runner warms it up before sending heavy ingest work.
#
# Uses the Python ingestion runner (app.run_ingestion) which batches tickers
# across multiple HTTP requests — critical on Render free tier where one giant
# request for the whole SP500 blocks the single worker and times out every
# later source. Sources without API keys are skipped automatically.
#
# Required GitHub secret:
#   BACKEND_URL  →  https://blocks-finance.onrender.com  (no trailing slash)
#
# Optional GitHub secrets (keyed sources are skipped when these are absent):
#   FMP_API_KEY      →  Financial Modeling Prep key
#   FRED_API_KEY     →  FRED key
#   FINNHUB_API_KEY  →  Finnhub key
#
# Manual trigger: Actions tab → "Daily Data Ingestion" → Run workflow.
# You can pick the universe preset (default / sp500) from the dropdown.

on:
  schedule:
    - cron: "30 6 * * 1-5"   # Mon–Fri 06:30 UTC
  workflow_dispatch:          # manual trigger from GitHub UI
    inputs:
      preset:
        description: "Universe preset"
        type: choice
        options: ["default", "sp500"]
        default: "sp500"
      period:
        description: "Price history period"
        type: choice
        options: ["1y", "2y", "5y"]
        default: "2y"

jobs:
  ingest:
    name: Ingest price & fundamentals
    runs-on: ubuntu-latest
    # SP500 (~500 tickers) in batches of 25 across 5 sources takes a while on
    # Render free tier (DuckLake upserts are network-bound). 90 min headroom.
    timeout-minutes: 90

    env:
      BLOCKS_FINANCE_BACKEND_URL: ${{ secrets.BACKEND_URL }}
      FMP_API_KEY:                ${{ secrets.FMP_API_KEY }}
      FRED_API_KEY:               ${{ secrets.FRED_API_KEY }}
      FINNHUB_API_KEY:            ${{ secrets.FINNHUB_API_KEY }}
      PRESET:                     ${{ github.event.inputs.preset || 'sp500' }}
      PERIOD:                     ${{ github.event.inputs.period || '2y' }}

    steps:
      - name: Show config
        run: |
          echo "Backend: $BLOCKS_FINANCE_BACKEND_URL"
          echo "Preset:  $PRESET"
          echo "Period:  $PERIOD"
          echo "Keys:    FMP=${FMP_API_KEY:+set}  FRED=${FRED_API_KEY:+set}  FINNHUB=${FINNHUB_API_KEY:+set}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      # The runner warms up the backend (handles Render cold start), resolves
      # the universe, then batches every per-ticker source into small HTTP
      # requests so no single call blocks the Render worker.
      - name: Run ingestion
        working-directory: backend
        run: |
          python -m app.run_ingestion --preset "$PRESET" --period "$PERIOD"

      - name: Done
        run: echo "Ingestion complete at $(date -u)"
